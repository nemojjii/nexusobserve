[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nexus-server"
version = "0.1.0"
description = "Nexus server — FastAPI + SQLite store for agent decision records."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=7", "httpx>=0.27"]

[tool.setuptools]
packages = ["nexus_server"]

[tool.setuptools.package-dir]
nexus_server = "nexus_server"
